version: "3.9"

services:
  web:
    build: .
    container_name: workflow_ia_web
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - .:/app
    command: sh -c "python manage.py migrate && python local_ia/trainer.py && uvicorn core.asgi:app --host 0.0.0.0 --port ${PORT:-8000}"